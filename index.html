<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VoiceNote Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #f0a030;
    --accent-dim: rgba(240,160,48,0.13);
    --green: #3ecf8e;
    --red: #f56565;
    --yellow: #f0c040;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 13px; height: 13px; color: #000; }
  header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: .04em; }
  header .ver { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }

  /* ── Audio strip ── */
  #audio-strip {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .audio-row1, .audio-row2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .audio-fname {
    flex: 1; font-family: var(--mono); font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .audio-fname.loaded { color: var(--text); }
  .seek-wrap { display: flex; flex-direction: column; gap: 2px; }
  .time-row {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 10px; color: var(--muted);
  }

  /* ── Text block ── */
  #text-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 10px 14px 12px;
    gap: 8px;
  }
  .text-row { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .text-fname {
    flex: 1; font-family: var(--mono); font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .text-fname.loaded { color: var(--text); }

  #text-preview {
    flex: 1;
    font-family: var(--mono); font-size: 13px; line-height: 1.7; color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    cursor: pointer;
    transition: border-color .15s;
    min-height: 0;
  }
  #text-preview:hover { border-color: #3a3a46; }
  #text-preview.loaded { color: var(--text); }
  .preview-empty { color: var(--muted); opacity: .45; font-style: italic; font-size: 12px; }

  .save-msg {
    font-family: var(--mono); font-size: 10px; color: var(--green);
    flex-shrink: 0; min-height: 14px;
  }
  .save-msg.error { color: var(--red); }

  /* ── Buttons ── */
  .btn {
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    padding: 6px 13px;
    border: 1px solid var(--border); border-radius: 6px;
    cursor: pointer; background: var(--surface2); color: var(--text);
    transition: background .12s, border-color .12s;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn:hover { background: #26262e; border-color: #3a3a46; }
  .btn:active { transform: scale(.96); }
  .btn:disabled { opacity: .28; cursor: not-allowed; transform: none; }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .btn-accent:hover { background: #d88c25; border-color: #d88c25; }

  .play-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .12s, transform .1s;
  }
  .play-btn:hover { background: #d88c25; }
  .play-btn:active { transform: scale(.93); }
  .play-btn:disabled { opacity: .28; cursor: not-allowed; transform: none; }
  .play-btn svg { width: 13px; height: 13px; color: #000; }

  .speed-pills { display: flex; gap: 3px; }
  .speed-pill {
    font-family: var(--mono); font-size: 10px;
    padding: 4px 8px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  .speed-pill:hover { color: var(--text); border-color: #3a3a46; }
  .speed-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  input[type=range] {
    -webkit-appearance: none; width: 100%;
    height: 3px; background: var(--border); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px;
    background: var(--accent); border-radius: 50%; cursor: pointer;
  }
  input[type=range]:disabled { opacity: .3; cursor: not-allowed; }

  /* ── Editor Screen ── */
  #editor-screen {
    display: none; position: fixed; inset: 0;
    background: var(--bg); flex-direction: column;
    z-index: 200; animation: fadeUp .18s ease;
  }
  #editor-screen.open { display: flex; }
  @keyframes fadeUp {
    from { transform: translateY(16px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* Mini player */
  .mini-player {
    flex-shrink: 0; background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px 6px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .mini-row1 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .mini-fname {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mini-time { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .mini-speed { display: flex; gap: 3px; }
  .mini-speed-pill {
    font-family: var(--mono); font-size: 10px;
    padding: 3px 7px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .12s;
  }
  .mini-speed-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Editor toolbar */
  .editor-toolbar {
    flex-shrink: 0; background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .editor-fname {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Auto-save status badge ── */
  #autosave-badge {
    font-family: var(--mono); font-size: 10px;
    padding: 3px 8px; border-radius: 20px;
    border: 1px solid transparent;
    transition: all .3s;
    white-space: nowrap; flex-shrink: 0;
    display: none; /* shown only when file loaded */
  }
  #autosave-badge.saved    { color: var(--green);  border-color: rgba(62,207,142,.3); background: rgba(62,207,142,.08); }
  #autosave-badge.dirty    { color: var(--yellow); border-color: rgba(240,192,64,.3);  background: rgba(240,192,64,.08); }
  #autosave-badge.saving   { color: var(--muted);  border-color: var(--border);        background: transparent; }
  #autosave-badge.error    { color: var(--red);    border-color: rgba(245,101,101,.3); background: rgba(245,101,101,.08); }

  .ts-btn {
    font-family: var(--mono); font-size: 10px;
    padding: 4px 9px; border-radius: 5px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--accent);
    cursor: pointer; transition: all .12s; white-space: nowrap; flex-shrink: 0;
  }
  .ts-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
  .ts-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ── Textarea (高速化のキモ) ── */
  .editor-area {
    flex: 1; overflow: hidden; display: flex;
  }

  textarea#main-editor {
    width: 100%; height: 100%;
    background: transparent; border: none; outline: none; resize: none;
    font-family: var(--mono);
    font-size: 14px; line-height: 1.75; color: var(--text);
    caret-color: var(--accent);
    padding: 16px 18px;
    /* ── 高速化: ブラウザの自動補正を全部切る ── */
    -webkit-text-size-adjust: none;
    text-rendering: optimizeSpeed;
    /* spell/autocorrect は JS でも切る */
    overflow-y: auto;
    overflow-x: hidden;
    will-change: scroll-position; /* スクロール合成レイヤー化 */
  }
  textarea#main-editor::selection { background: var(--accent-dim); }

  /* ── Char count ── */
  #char-count {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    white-space: nowrap; flex-shrink: 0;
  }

  /* ── Draft restore banner ── */
  #draft-banner {
    display: none;
    flex-shrink: 0;
    background: rgba(240,160,48,0.1);
    border: 1px solid rgba(240,160,48,0.35);
    border-radius: 7px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp .2s ease;
  }
  #draft-banner.hidden { display: none !important; }
  #draft-banner .draft-msg { flex: 1; }
  #draft-banner .draft-time { color: var(--muted); font-size: 10px; }


  /* ── Startup draft list ── */
  #startup-banner {
    flex-shrink: 0;
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 10px 14px 0;
  }
  #startup-banner.visible { display: flex; }

  .startup-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .draft-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(240,160,48,0.08);
    border: 1px solid rgba(240,160,48,0.25);
    border-radius: 7px;
    padding: 8px 12px;
    animation: fadeUp .2s ease;
  }

  .draft-item-icon {
    font-size: 14px;
    flex-shrink: 0;
  }

  .draft-item-info {
    flex: 1;
    min-width: 0;
  }

  .draft-item-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .draft-item-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .draft-item-meta .accent { color: var(--accent); }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ══ MAIN ══ -->
<div id="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 10 Q8 4 14 10"/>
        <path d="M4 13 Q8 7 12 13"/>
      </svg>
    </div>
    <h1>VoiceNote Editor</h1>
    <span class="ver">web</span>
  </header>

  <!-- ── Audio strip ── -->
  <div id="audio-strip">
    <div class="audio-row1">
      <div class="audio-fname" id="audio-filename">未選択</div>
      <button class="btn btn-accent" onclick="openAudio()">音声を開く</button>
    </div>
    <div class="audio-row2">
      <button class="btn" style="padding:6px 10px;" id="skip-back-btn" onclick="skipAudio(-10)" disabled>⏪ 10</button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()" disabled>
        <svg id="play-icon" viewBox="0 0 16 16" fill="currentColor"><polygon points="4,2 14,8 4,14"/></svg>
      </button>
      <button class="btn" style="padding:6px 10px;" id="skip-fwd-btn" onclick="skipAudio(10)" disabled>10 ⏩</button>
      <div class="speed-pills" style="margin-left:4px;">
        <button class="speed-pill active" data-speed="1.0"  onclick="setSpeed(1.0)">1×</button>
        <button class="speed-pill"        data-speed="1.25" onclick="setSpeed(1.25)">1.25×</button>
        <button class="speed-pill"        data-speed="1.5"  onclick="setSpeed(1.5)">1.5×</button>
        <button class="speed-pill"        data-speed="2.0"  onclick="setSpeed(2.0)">2×</button>
      </div>
    </div>
    <div class="seek-wrap">
      <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1"
             disabled oninput="onSeekInput(this.value)" onchange="onSeekChange(this.value)">
      <div class="time-row">
        <span id="current-time">00:00</span>
        <span id="total-time">00:00</span>
      </div>
    </div>
  </div>

  <!-- ── Text block ── -->
  <div id="text-block">
    <!-- ページ起動時の下書き一覧 -->
    <div id="startup-banner"></div>

    <div class="text-row">
      <div class="text-fname" id="text-filename">未選択</div>
      <button class="btn btn-accent" id="open-text-btn" onclick="openText()">開く</button>
      <button class="btn" id="edit-btn" onclick="openEditor()" disabled>編集</button>
      <button class="btn" id="save-btn" onclick="manualSave()" disabled>保存</button>
    </div>
    <!-- 下書き復元バナー -->
    <div id="draft-banner" class="hidden">
      <span class="draft-msg">⚡ 未保存の下書きがあります</span>
      <span class="draft-time" id="draft-time"></span>
      <button class="btn" style="padding:4px 10px;font-size:11px;color:var(--accent);border-color:rgba(240,160,48,.4);" onclick="restoreDraft()">復元</button>
      <button class="btn" style="padding:4px 10px;font-size:11px;" onclick="discardDraft()">破棄</button>
    </div>

    <div id="text-preview" onclick="if(state.textLoaded) openEditor()">
      <span class="preview-empty">テキストファイルを開いてください</span>
    </div>
    <div class="save-msg" id="save-msg"></div>
  </div>
</div>

<!-- ══ EDITOR SCREEN ══ -->
<div id="editor-screen">
  <!-- Mini Player -->
  <div class="mini-player">
    <div class="mini-row1">
      <div class="mini-fname" id="mini-audio-filename">音声未選択</div>
      <button class="btn" style="padding:4px 8px;font-size:11px;" id="mini-skip-back" onclick="skipAudio(-10)" disabled>⏪</button>
      <button class="play-btn" style="width:28px;height:28px;" id="mini-play-btn" onclick="togglePlay()" disabled>
        <svg id="mini-play-icon" viewBox="0 0 16 16" fill="currentColor" style="width:11px;height:11px;"><polygon points="4,2 14,8 4,14"/></svg>
      </button>
      <button class="btn" style="padding:4px 8px;font-size:11px;" id="mini-skip-fwd" onclick="skipAudio(10)" disabled>⏩</button>
      <span class="mini-time"><span id="mini-current">00:00</span> / <span id="mini-total">00:00</span></span>
      <div class="mini-speed">
        <button class="mini-speed-pill active" data-speed="1.0"  onclick="setSpeed(1.0)">1×</button>
        <button class="mini-speed-pill"        data-speed="1.25" onclick="setSpeed(1.25)">1.25×</button>
        <button class="mini-speed-pill"        data-speed="1.5"  onclick="setSpeed(1.5)">1.5×</button>
        <button class="mini-speed-pill"        data-speed="2.0"  onclick="setSpeed(2.0)">2×</button>
      </div>
    </div>
    <input type="range" id="mini-seek-bar" min="0" max="100" value="0" step="0.1"
           disabled oninput="onSeekInput(this.value)" onchange="onSeekChange(this.value)">
  </div>

  <!-- Toolbar -->
  <div class="editor-toolbar">
    <div class="editor-fname" id="editor-filename">未選択</div>
    <span id="char-count"></span>
    <div id="autosave-badge"></div>
    <button class="ts-btn" id="ts-insert-btn" onclick="insertTimestamp()" disabled>＋[<span id="ts-preview">00:00</span>]</button>
    <div style="display:flex;align-items:center;gap:4px;margin-right:4px;">
      <button class="btn" onclick="changeFontSize(-1)" style="padding:5px 9px;font-size:13px;line-height:1;" title="文字を小さく">A-</button>
      <button class="btn" onclick="changeFontSize(1)"  style="padding:5px 9px;font-size:13px;line-height:1;" title="文字を大きく">A+</button>
    </div>
    <button class="btn" id="editor-save-btn" onclick="manualSave()" style="padding:5px 12px;font-size:12px;" disabled>保存</button>
    <button class="btn" onclick="closeEditor()" style="padding:5px 12px;font-size:12px;">✕</button>
  </div>

  <!-- Textarea -->
  <div class="editor-area">
    <textarea id="main-editor"
      placeholder="テキストファイルを開いてください…"
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      data-gramm="false"
      data-gramm_editor="false"
      data-enable-grammarly="false"
    ></textarea>
  </div>
</div>

<audio id="audio-el" preload="metadata"></audio>

<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
// ── GAS API ──────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxd6o-9ZA6daFr1jgwc4Tusv16J8NLCWIqKaPy_yFEa7S1cirgtuU0wWCIJiWWtty2z/exec';
const IS_IOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

const state = {
  audioLoaded: false,
  textLoaded: false,
  currentSpeed: 1.0,
  seekDragging: false,
  textFileHandle: null,   // File System Access API handle (PC only)
  gasMode: false,         // GAS経由で開いたファイル（iPhone用）
  textContent: '',        // last-saved content (for dirty check)
  fileName: '',
  autosaveTimer: null,    // debounce timer
  draftTimer: null,      // localStorage draft debounce
  saveStatus: 'saved',   // 'saved' | 'dirty' | 'saving' | 'error'
};

const audio = document.getElementById('audio-el');
const ta    = document.getElementById('main-editor');

// ══════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════
function openAudio() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'audio/mpeg,audio/mp4,audio/wav,audio/x-m4a,.mp3,.m4a,.wav';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    audio.src = URL.createObjectURL(file);
    audio.load();
    const n = file.name;
    ['audio-filename','mini-audio-filename'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = n; el.classList.add('loaded');
    });
    state.audioLoaded = true;
    updateAudioUI();
  };
  input.click();
}

audio.addEventListener('loadedmetadata', () => {
  const d = audio.duration;
  ['seek-bar','mini-seek-bar'].forEach(id => document.getElementById(id).max = d);
  document.getElementById('total-time').textContent = fmt(d);
  document.getElementById('mini-total').textContent = fmt(d);
  updateAudioUI();
});

audio.addEventListener('timeupdate', () => {
  if (state.seekDragging) return;
  const t = audio.currentTime;
  ['seek-bar','mini-seek-bar'].forEach(id => document.getElementById(id).value = t);
  document.getElementById('current-time').textContent = fmt(t);
  document.getElementById('mini-current').textContent = fmt(t);
  document.getElementById('ts-preview').textContent = fmt(t);
});

audio.addEventListener('ended', () => setPlayIcons(false));
audio.addEventListener('pause',  () => setPlayIcons(false));
audio.addEventListener('play',   () => setPlayIcons(true));

function togglePlay() {
  if (!state.audioLoaded) return;
  if (audio.paused) { audio.play(); audio.playbackRate = state.currentSpeed; }
  else audio.pause();
}

function skipAudio(s) {
  if (!state.audioLoaded) return;
  audio.currentTime = Math.max(0, Math.min(audio.currentTime + s, audio.duration));
}

function setSpeed(s) {
  state.currentSpeed = s; audio.playbackRate = s;
  document.querySelectorAll('.speed-pill,.mini-speed-pill').forEach(b =>
    b.classList.toggle('active', parseFloat(b.dataset.speed) === s));
}

function onSeekInput(v) {
  state.seekDragging = true;
  const t = parseFloat(v);
  ['seek-bar','mini-seek-bar'].forEach(id => document.getElementById(id).value = t);
  document.getElementById('current-time').textContent = fmt(t);
  document.getElementById('mini-current').textContent = fmt(t);
}
function onSeekChange(v) { state.seekDragging = false; audio.currentTime = parseFloat(v); }

function setPlayIcons(playing) {
  const svg = playing
    ? '<rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/>'
    : '<polygon points="4,2 14,8 4,14"/>';
  ['play-icon','mini-play-icon'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = svg;
  });
}

function updateAudioUI() {
  const on = state.audioLoaded;
  ['skip-back-btn','skip-fwd-btn','seek-bar','play-btn',
   'mini-skip-back','mini-skip-fwd','mini-seek-bar','mini-play-btn'].forEach(id => {
    const el = document.getElementById(id); if (el) el.disabled = !on;
  });
  const ts = document.getElementById('ts-insert-btn'); if (ts) ts.disabled = !on;
}

// ══════════════════════════════════════════════════════
//  TEXT — LOAD
// ══════════════════════════════════════════════════════
async function openText() {
  // iOSの場合はGASファイル選択UIを表示
  if (IS_IOS) { await openTextFromGAS(); return; }
  if (window.showOpenFilePicker) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'テキスト', accept: { 'text/plain': ['.txt'] } }],
      });
      state.textFileHandle = handle;
      const file = await handle.getFile();
      loadTextContent(await file.text(), file.name);
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.txt,text/plain';
  input.onchange = async e => {
    const f = e.target.files[0]; if (!f) return;
    state.textFileHandle = null;
    loadTextContent(await f.text(), f.name);
  };
  input.click();
}

// ── GASへのリクエスト（scriptタグJSONP方式）
function gasRequest(params) {
  return new Promise((resolve, reject) => {
    const cbName = '_gasCb_' + Date.now();
    const url = GAS_URL + '?' + Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&') + '&callback=' + cbName;
    const script = document.createElement('script');
    const tid = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウト'));
    }, 15000);
    function cleanup() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(tid);
    }
    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };
    script.onerror = () => {
      cleanup();
      reject(new Error('スクリプト読込失敗'));
    };
    script.src = url;
    document.head.appendChild(script);
  });
}

// ── GAS経由でファイル一覧を取得して選択
async function openTextFromGAS() {
  const btn = document.getElementById('open-text-btn');
  if (btn) { btn.disabled = true; btn.textContent = '読込中…'; }
  try {
    const data = await gasRequest({ action: 'list' });
    if (btn) { btn.disabled = false; btn.textContent = '開く'; }
    showGASDialog(data.files && data.files.length ? data.files : ['（ファイルなし）'], data.files && data.files.length ? async (f) => loadFromGAS(f) : null);
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '開く'; }
    alert('GAS接続エラー: ' + e.message);
  }
}

async function loadFromGAS(filename) {
  const msg = document.getElementById('save-msg');
  msg.textContent = '読込中…'; msg.className = 'save-msg';
  try {
    const data = await gasRequest({ action: 'read', filename });
    state.gasMode = true;
    state.textFileHandle = null;
    loadTextContent(data.text || '', filename);
    msg.textContent = '';
  } catch(e) {
    msg.textContent = '読込失敗: ' + e.message;
    msg.className = 'save-msg error';
  }
}

function showGASDialog(files, onSelect) {
  let overlay = document.getElementById('gas-overlay');
  if (overlay) overlay.remove();
  overlay = document.createElement('div');
  overlay.id = 'gas-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeUp .2s ease;';

  const sheet = document.createElement('div');
  sheet.style.cssText = 'background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 16px 40px;';

  const label = document.createElement('div');
  label.style.cssText = 'font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:14px;letter-spacing:.08em;';
  label.textContent = 'GOOGLE DRIVE のファイルを選択';
  sheet.appendChild(label);

  files.forEach(f => {
    const btn = document.createElement('button');
    btn.style.cssText = 'display:block;width:100%;text-align:left;padding:12px 14px;margin-bottom:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:13px;color:var(--text);cursor:pointer;';
    btn.textContent = '📄 ' + f;
    btn.addEventListener('click', () => {
      overlay.remove();
      if (onSelect) onSelect(f);
    });
    sheet.appendChild(btn);
  });

  const cancel = document.createElement('button');
  cancel.style.cssText = 'display:block;width:100%;padding:11px;margin-top:8px;background:transparent;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--muted);cursor:pointer;';
  cancel.textContent = 'キャンセル';
  cancel.addEventListener('click', () => overlay.remove());
  sheet.appendChild(cancel);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

function loadTextContent(text, name) {
  state.textContent = text;
  state.fileName = name;
  state.textLoaded = true;

  ['text-filename','editor-filename'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = name; el.classList.add('loaded');
  });
  renderPreview(text);

  // ── 高速化ポイント①: value を直接代入するだけ（DOM操作なし）
  ta.value = text;

  ['edit-btn','save-btn','editor-save-btn'].forEach(id =>
    document.getElementById(id).disabled = false);

  updateCharCount(text);
  setBadge('saved');
  document.getElementById('save-msg').textContent = '';

  // 下書き確認（同名ファイルの localStorage draft があれば復元バナーを出す）
  checkDraftOnLoad(name);
}

// ══════════════════════════════════════════════════════
//  TEXT — FAST EDITING
//
//  キーストロークのたびに state やプレビューを更新しない。
//  textarea はブラウザネイティブに任せ、
//  ① 文字数カウント: 300ms デバウンス（軽量）
//  ② 自動保存:      5000ms デバウンス（重い処理は後回し）
// ══════════════════════════════════════════════════════
let _charCountTimer = null;

ta.addEventListener('input', () => {
  // ── dirty バッジを即座に表示（= 唯一の即時更新）
  if (state.saveStatus !== 'dirty') setBadge('dirty');

  // ── 文字数カウント: 300ms デバウンス
  clearTimeout(_charCountTimer);
  _charCountTimer = setTimeout(() => updateCharCount(ta.value), 300);

  // ── ローカル下書き: 2秒デバウンス（localStorage は同期・軽量）
  clearTimeout(state.draftTimer);
  state.draftTimer = setTimeout(() => saveDraftLocal(ta.value), 2000);

  // ── ファイル自動保存: 5秒デバウンス（キーを打ち続ける間は延長し続ける）
  scheduleAutosave();
});

function scheduleAutosave() {
  clearTimeout(state.autosaveTimer);
  state.autosaveTimer = setTimeout(() => autosave(), 5000);
}

function updateCharCount(text) {
  const n = text.length;
  const k = n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n;
  document.getElementById('char-count').textContent = k + ' 文字';
}

// ══════════════════════════════════════════════════════
//  SAVE — CORE
// ══════════════════════════════════════════════════════
async function _writeFile(text) {
  if (state.gasMode) {
    // GAS経由で上書き保存（iPhone用）
    const data = await gasRequest({ action: 'write', filename: state.fileName, text });
    if (!data.saved) throw new Error('GAS保存失敗');
  } else if (state.textFileHandle) {
    // File System Access API: 直接上書き（PC Chrome用）
    const w = await state.textFileHandle.createWritable();
    await w.write(text);
    await w.close();
  } else {
    // フォールバック: ダウンロード
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
    a.download = state.fileName || 'output.txt';
    a.click();
  }
}

async function autosave() {
  if (!state.textLoaded || state.saveStatus === 'saving') return;
  const text = ta.value;
  if (text === state.textContent) { setBadge('saved'); return; } // 変更なし

  setBadge('saving');
  try {
    await _writeFile(text);
    state.textContent = text;
    renderPreview(text);
    clearDraftLocal(); // ファイル保存成功 → 下書き削除
    setBadge('saved');
  } catch(e) {
    setBadge('error', '自動保存失敗');
    console.error('autosave error:', e);
  }
}

async function manualSave() {
  if (!state.textLoaded) return;
  clearTimeout(state.autosaveTimer); // 手動保存したらデバウンスキャンセル
  const text = ta.value;
  setBadge('saving');
  try {
    await _writeFile(text);
    state.textContent = text;
    renderPreview(text);
    clearDraftLocal(); // ファイル保存成功 → 下書き削除
    setBadge('saved');
    // メイン画面のメッセージ
    const msg = document.getElementById('save-msg');
    msg.textContent = '保存した'; msg.className = 'save-msg';
    setTimeout(() => msg.textContent = '', 2000);
  } catch(e) {
    setBadge('error', '保存失敗: ' + e.message);
  }
}


// ══════════════════════════════════════════════════════
//  DRAFT — localStorage 下書き保存（リロード復元用）
//  キー: vne_draft_{ファイル名}
//  値:   JSON { text, savedAt }
// ══════════════════════════════════════════════════════
function draftKey() { return 'vne_draft_' + state.fileName; }

function saveDraftLocal(text) {
  if (!state.textLoaded) return;
  try {
    localStorage.setItem(draftKey(), JSON.stringify({
      text,
      savedAt: Date.now(),
    }));
  } catch(e) {
    // localStorage がいっぱいの場合は無視（容量超過は稀）
    console.warn('draft save failed:', e);
  }
}

function clearDraftLocal() {
  try { localStorage.removeItem(draftKey()); } catch(e) {}
}

// ファイルを開いたとき、同名の下書きがあるか確認
function checkDraftOnLoad(name) {
  try {
    const raw = localStorage.getItem('vne_draft_' + name);
    if (!raw) return;
    const draft = JSON.parse(raw);
    // 本文と同じなら下書き不要（ファイル保存後にリロードした場合など）
    if (draft.text === state.textContent) { localStorage.removeItem('vne_draft_' + name); return; }

    // バナー表示
    const banner = document.getElementById('draft-banner');
    const timeEl = document.getElementById('draft-time');
    const ago = fmtAgo(draft.savedAt);
    timeEl.textContent = ago + '前';
    banner.classList.remove('hidden');

    // 下書き内容を一時保持
    state._pendingDraft = draft.text;
  } catch(e) {}
}

function restoreDraft() {
  if (!state._pendingDraft) return;
  ta.value = state._pendingDraft;
  updateCharCount(state._pendingDraft);
  renderPreview(state._pendingDraft);
  setBadge('dirty');
  hideDraftBanner();
  // 復元後すぐに下書きを再保存（上書き確認）
  saveDraftLocal(state._pendingDraft);
  state._pendingDraft = null;
}

function discardDraft() {
  clearDraftLocal();
  state._pendingDraft = null;
  hideDraftBanner();
}

function hideDraftBanner() {
  document.getElementById('draft-banner').classList.add('hidden');
}

// 経過時間を日本語で
function fmtAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)  return s + '秒';
  if (s < 3600) return Math.floor(s/60) + '分';
  return Math.floor(s/3600) + '時間';
}

// ── バッジ表示
function setBadge(status, label) {
  const badge = document.getElementById('autosave-badge');
  if (!state.textLoaded) { badge.style.display = 'none'; return; }
  badge.style.display = '';
  state.saveStatus = status;
  const labels = {
    saved:  '● 保存済み',
    dirty:  '○ 未保存',
    saving: '⟳ 保存中…',
    error:  '✕ ' + (label || '保存失敗'),
  };
  badge.textContent = labels[status] || status;
  badge.className = status; // CSS クラスで色分け
}

// ── プレビュー更新（エディタ閉じるときのみ更新するので重くない）
function renderPreview(text) {
  const el = document.getElementById('text-preview');
  if (!text) {
    el.innerHTML = '<span class="preview-empty">テキストファイルを開いてください</span>';
    el.classList.remove('loaded');
  } else {
    // ── 高速化ポイント②: プレビューはスライスだけ（全文を DOM に入れない）
    el.textContent = text.slice(0, 800) + (text.length > 800 ? '\n…' : '');
    el.classList.add('loaded');
  }
}

// ══════════════════════════════════════════════════════
//  自動保存トリガー — バックグラウンド / タブ離脱 / 終了
// ══════════════════════════════════════════════════════

// ① バックグラウンド移行（タブを切り替えたとき）
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state.textLoaded) {
    clearTimeout(state.autosaveTimer);
    autosave(); // 即時保存
  }
});

// ② タブ/ウィンドウを閉じる直前
//    File System Access API があればサイレントに保存
//    なければ「変更があります」ダイアログ
window.addEventListener('beforeunload', e => {
  if (!state.textLoaded) return;
  const current = ta.value;
  if (current === state.textContent) return; // 変更なし

  if (state.textFileHandle) {
    // 非同期だが beforeunload では間に合わないことがある。
    // sendBeacon か同期的な workaround はないため、
    // ここでは Blob を使った最終トライのみ行う。
    autosave();
    // ブラウザに「本当に閉じますか？」ダイアログを出させる
    e.preventDefault();
    e.returnValue = '保存されていない変更があります。本当に閉じますか？';
  } else {
    e.preventDefault();
    e.returnValue = '保存されていない変更があります。本当に閉じますか？';
  }
});

// ══════════════════════════════════════════════════════
//  EDITOR OPEN / CLOSE
// ══════════════════════════════════════════════════════
function openEditor() {
  const saved = localStorage.getItem('editorFontSize');
  if (saved) document.getElementById('main-editor').style.fontSize = saved + 'px';
  if (!state.textLoaded) return;
  document.getElementById('editor-screen').classList.add('open');
  // ── 高速化ポイント③: 開くときは value を再代入しない
  //    （ta.value は loadTextContent 以降ずっと生きている）
  setBadge(state.saveStatus);
  ta.focus();
}

function changeFontSize(delta) {
  const editor = document.getElementById('main-editor');
  const current = parseFloat(getComputedStyle(editor).fontSize);
  const next = Math.min(Math.max(current + delta * 2, 10), 32);
  editor.style.fontSize = next + 'px';
  localStorage.setItem('editorFontSize', next);
}

function closeEditor() {
  // プレビュー更新（スライスのみ = 高速）
  renderPreview(ta.value);
  state.textContent = ta.value; // dirty チェック用に同期
  document.getElementById('editor-screen').classList.remove('open');
}

// ══════════════════════════════════════════════════════
//  TIMESTAMP INSERT
// ══════════════════════════════════════════════════════
function insertTimestamp() {
  if (!state.audioLoaded) return;
  const pos = ta.selectionStart;
  const ins = `[${fmt(audio.currentTime)}]`;
  // ── 高速化ポイント④: execCommand は deprecated だが
  //    Undo スタックを壊さず挿入できる唯一の方法
  //    （将来は editContext API へ）
  ta.focus();
  document.execCommand('insertText', false, ins);
}

// ══════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const inEd = document.getElementById('editor-screen').classList.contains('open');
  if ((e.metaKey||e.ctrlKey) && e.key === 's') {
    e.preventDefault(); manualSave();
  }
  if ((e.metaKey||e.ctrlKey) && e.key === ' ') {
    e.preventDefault(); togglePlay();
  }
  if (e.key === 'Escape' && inEd) closeEditor();
});


// ══════════════════════════════════════════════════════
//  起動時: localStorage の下書きをスキャンして表示
// ══════════════════════════════════════════════════════
function scanDraftsOnStartup() {
  const drafts = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key.startsWith('vne_draft_')) continue;
      const raw = localStorage.getItem(key);
      if (!raw) continue;
      const d = JSON.parse(raw);
      const name = key.replace('vne_draft_', '');
      drafts.push({ key, name, text: d.text, savedAt: d.savedAt });
    }
  } catch(e) { return; }

  if (drafts.length === 0) return;

  // 新しい順にソート
  drafts.sort((a, b) => b.savedAt - a.savedAt);

  const banner = document.getElementById('startup-banner');
  banner.innerHTML = '<div class="startup-label">⚡ 前回の下書き</div>';
  banner.classList.add('visible');

  drafts.forEach(d => {
    const chars = d.text.length >= 1000
      ? (d.text.length / 1000).toFixed(1) + 'k'
      : d.text.length;
    const item = document.createElement('div');
    item.className = 'draft-item';
    item.innerHTML = `
      <div class="draft-item-icon">📄</div>
      <div class="draft-item-info">
        <div class="draft-item-name">${escHtml(d.name)}</div>
        <div class="draft-item-meta">
          <span class="accent">${fmtAgo(d.savedAt)}前</span>
          &nbsp;·&nbsp; ${chars} 文字
        </div>
      </div>
      <button class="btn" style="padding:4px 10px;font-size:11px;color:var(--accent);border-color:rgba(240,160,48,.4);"
        onclick="restoreFromStartup(${JSON.stringify(d.key)})">復元</button>
      <button class="btn" style="padding:4px 10px;font-size:11px;"
        onclick="deleteFromStartup(${JSON.stringify(d.key)}, this)">削除</button>
    `;
    banner.appendChild(item);
  });
}

function restoreFromStartup(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return;
    const d = JSON.parse(raw);
    const name = key.replace('vne_draft_', '');

    // ファイルなしで下書きを読み込む
    // （保存はダウンロードになるが、編集・確認は可能）
    state.textContent = '';      // ファイル未保存なので差分は全体
    state.fileName = name;
    state.textLoaded = true;
    state.textFileHandle = null;
    state._pendingDraft = null;

    ['text-filename','editor-filename'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = name + ' (下書き)';
      el.classList.add('loaded');
    });

    ta.value = d.text;
    renderPreview(d.text);
    updateCharCount(d.text);
    ['edit-btn','save-btn','editor-save-btn'].forEach(id =>
      document.getElementById(id).disabled = false);
    setBadge('dirty');

    // スタートアップバナーを隠す
    document.getElementById('startup-banner').classList.remove('visible');

    // エディタを開く
    openEditor();
  } catch(e) { console.error(e); }
}

function deleteFromStartup(key, btn) {
  try { localStorage.removeItem(key); } catch(e) {}
  const item = btn.closest('.draft-item');
  if (item) item.remove();
  // 残りがなければバナーを隠す
  const banner = document.getElementById('startup-banner');
  if (banner.querySelectorAll('.draft-item').length === 0) {
    banner.classList.remove('visible');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ページ読み込み時に実行
document.addEventListener('DOMContentLoaded', scanDraftsOnStartup);

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function fmt(s) {
  if (!isFinite(s)) return '00:00';
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');
}
